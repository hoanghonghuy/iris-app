name: Security CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: read
  security-events: write

jobs:
  dependency-check-go:
    name: Dependency Check - Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Check for vulnerable Go dependencies
        run: |
          set -o pipefail
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          echo "Go version: $(go version)"
          echo "Running: govulncheck ./apps/api/..."
          if ! govulncheck ./apps/api/... 2>&1 | tee govulncheck.log; then
            {
              echo "## govulncheck failed"
              echo ""
              echo "Vulnerabilities were found in code paths reachable from apps/api."
              echo "Full output is in the job log; last 80 lines:"
              echo ""
              echo '```text'
              tail -n 80 govulncheck.log
              echo '```'
              echo ""
              echo "Typical fix: upgrade the Go toolchain (go.mod / Docker builder image) to a patched release."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::govulncheck reported vulnerabilities. Expand this step log or open the job Summary tab."
            exit 1
          fi
          echo "govulncheck: no vulnerabilities affecting ./apps/api/..."

  dependency-check-npm:
    name: Dependency Check - npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Check npm audit
        run: |
          cd apps/web
          echo "Running: npm audit --audit-level=high"
          npm audit --audit-level=high

  trivy-filesystem-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Table format prints CVEs to the job log. SARIF-only output hides failures in Actions UI.
      - name: Run Trivy filesystem scan (log)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        id: upload-sarif
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Explain SARIF upload result
        if: always()
        run: |
          if [ "${{ steps.upload-sarif.outcome }}" = "success" ]; then
            echo "Trivy SARIF uploaded to the Security tab."
          else
            echo "::warning::Trivy SARIF was not uploaded (private repos need GitHub Advanced Security, or the scan produced no SARIF file). The table scan above is the source of truth for CI failure."
          fi

  secrets-scanning:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commit range
        id: commit-range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          else
            BASE="$(git rev-list --max-parents=0 HEAD)"
            HEAD="${{ github.sha }}"
          fi

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi

          echo "event=${{ github.event_name }} base=$BASE head=$HEAD"

          if [[ "$BASE" == "$HEAD" ]]; then
            echo "should_scan=false" >> "$GITHUB_OUTPUT"
            echo "base=$BASE" >> "$GITHUB_OUTPUT"
            echo "head=$HEAD" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_scan=true" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

      - name: TruffleHog Scanning
        if: steps.commit-range.outputs.should_scan == 'true'
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          path: ./
          base: ${{ steps.commit-range.outputs.base }}
          head: ${{ steps.commit-range.outputs.head }}

      - name: Skip message when no commit diff exists
        if: steps.commit-range.outputs.should_scan != 'true'
        run: |
          echo "Skipping TruffleHog: BASE and HEAD are identical for this event."
